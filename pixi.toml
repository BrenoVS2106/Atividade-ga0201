[workspace]
name = "template-notebooks"
description = "A template for Jupyter notebooks projects using Pixi"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64", "win-64"]

[dependencies]
ruff = "*"
pre-commit = "*"
ipython = "*"
jupyterlab = "*"
matplotlib = "*"
jupytext = "*"
pandas = "*"
numpy = "*"
scipy = "*"

[target.unix.activation.env]
PROJECT_ROOT = "$PIXI_PROJECT_ROOT"
NOTEBOOKS_PATH = "$PIXI_PROJECT_ROOT/notebooks"

[target.win.activation.env]
PROJECT_ROOT = "%PIXI_PROJECT_ROOT%"
NOTEBOOKS_PATH = "%PIXI_PROJECT_ROOT%\\notebooks"

[tasks]
precommit = "pre-commit run --all-files"
notebooks-smoke = "python -c 'from pathlib import Path; n=sorted(Path(\"notebooks\").rglob(\"*.ipynb\")); print(len(n), [str(p.relative_to(Path(\"notebooks\"))) for p in n])'"
notebooks-sync = "python scripts/sync_notebooks.py"
precommit-sync = "python scripts/sync_notebooks.py && pre-commit run --all-files"
